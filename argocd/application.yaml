apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bindery
  namespace: argocd
  labels:
    app.kubernetes.io/name: bindery
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/vavallee/bindery
    targetRevision: feat/editorial-redesign
    path: charts/bindery
    helm:
      valueFiles:
        - values.yaml
      # Homelab overrides: enable the Traefik IngressRoute on
      # bindery.autonomy.ninja; the chart defaults ship with ingress
      # disabled so generic consumers don't get an undeliverable route.
      values: |
        ingress:
          enabled: true
          host: bindery.autonomy.ninja
          entryPoints:
            - internal-https
          certResolver: internal
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
